<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle - softer blue-gray -->
  <circle cx="32" cy="32" r="32" fill="#64748b"/>

  <!-- Car body - front view -->
  <g>
    <!-- Main body -->
    <path d="M 18 28 L 18 42 L 20 46 L 44 46 L 46 42 L 46 28 L 44 26 L 20 26 Z" fill="#1e293b"/>

    <!-- Hood/bonnet -->
    <rect x="22" y="26" width="20" height="8" fill="#334155" rx="1"/>

    <!-- Windshield -->
    <path d="M 24 22 L 22 26 L 42 26 L 40 22 Z" fill="#0f172a" opacity="0.6"/>

    <!-- Roof -->
    <rect x="26" y="18" width="12" height="4" fill="#1e293b" rx="1"/>

    <!-- Grille -->
    <rect x="28" y="34" width="8" height="4" fill="#0f172a" rx="0.5"/>

    <!-- Headlights -->
    <ellipse cx="24" cy="36" rx="2" ry="2.5" fill="#e2e8f0"/>
    <ellipse cx="40" cy="36" rx="2" ry="2.5" fill="#e2e8f0"/>

    <!-- Bumper -->
    <rect x="20" y="40" width="24" height="2" fill="#0f172a" rx="1"/>

    <!-- Wheels -->
    <g>
      <!-- Left wheel -->
      <ellipse cx="22" cy="46" rx="3" ry="2" fill="#0f172a"/>
      <ellipse cx="22" cy="46" rx="1.5" ry="1" fill="#475569"/>

      <!-- Right wheel -->
      <ellipse cx="42" cy="46" rx="3" ry="2" fill="#0f172a"/>
      <ellipse cx="42" cy="46" rx="1.5" ry="1" fill="#475569"/>
    </g>

    <!-- Side mirrors -->
    <rect x="17" y="30" width="2" height="3" fill="#1e293b" rx="0.5"/>
    <rect x="45" y="30" width="2" height="3" fill="#1e293b" rx="0.5"/>
  </g>
</svg>
